  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

'woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Work Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d2b33ba8-6fb1-44d8-bb9b-1bdd9e09f74b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Work Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f7006787-1657-444e-abd4-7f953a57022c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   RevOps Portfolio — hi-fi design system\n   Theme: warm paper / ink / blue pen / yellow highlight\n   Type:  Space Grotesk (display) · Work Sans (body) · Space Mono (label)\n   ============================================================ */\n:root{\n  --paper:#f5f4ef;\n  --paper-2:#efece4;\n  --card:#fffefb;\n  --ink:#1c1b19;\n  --ink-2:#56544f;\n  --ink-3:#8a877f;\n  --line:#e2dfd6;\n  --line-2:#d4d0c5;\n  --blue:#2f6fed;\n  --blue-ink:#1f57c7;\n  --hl:rgba(245, 214, 73, .55);\n  --hl-solid:#f5d649;\n\n  --display:'Space Grotesk', system-ui, sans-serif;\n  --body:'Work Sans', system-ui, sans-serif;\n  --mono:'Space Mono', ui-monospace, monospace;\n\n  --maxw:1160px;\n  --r:16px;\n  --r-sm:11px;\n  --shadow:0 1px 2px rgba(28,27,25,.04), 0 12px 28px -12px rgba(28,27,25,.16);\n  --shadow-lift:0 2px 4px rgba(28,27,25,.05), 0 22px 44px -16px rgba(28,27,25,.26);\n}\n\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{\n  margin:0;background:var(--paper);color:var(--ink);\n  font-family:var(--body);font-size:17px;line-height:1.6;\n  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;\n}\na{color:inherit;text-decoration:none;}\nimg{max-width:100%;display:block;}\n::selection{background:var(--hl-solid);color:var(--ink);}\n\n/* ---------- layout ---------- */\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}\n.section{padding:96px 0;}\n.section--tight{padding:64px 0;}\n.eyebrow{\n  font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;\n  color:var(--blue);margin:0 0 18px;display:inline-flex;align-items:center;gap:9px;\n}\n.eyebrow::before{content:\"\";width:22px;height:1.5px;background:var(--blue);display:inline-block;}\n.eyebrow.muted{color:var(--ink-3);}\n.eyebrow.muted::before{background:var(--ink-3);}\n\n/* ---------- type ---------- */\n.display{font-family:var(--display);font-weight:600;letter-spacing:-.025em;line-height:1.02;margin:0;}\nh1.display{font-size:clamp(40px,6vw,76px);}\nh2.display{font-size:clamp(32px,4.4vw,52px);}\nh3.display{font-size:clamp(22px,2.6vw,30px);}\n.lead{font-size:clamp(18px,2vw,21px);color:var(--ink-2);line-height:1.55;}\n.hl{background:linear-gradient(transparent 58%, var(--hl) 58% 94%, transparent 94%);padding:0 .06em;}\n.mono{font-family:var(--mono);}\n.muted{color:var(--ink-2);}\n\n/* ---------- nav ---------- */\n.nav{\n  position:sticky;top:0;z-index:40;\n  backdrop-filter:saturate(1.2) blur(10px);\n  background:color-mix(in srgb, var(--paper) 82%, transparent);\n  border-bottom:1px solid var(--line);\n}\n.nav__in{display:flex;align-items:center;gap:14px;height:70px;}\n.brand{display:flex;align-items:center;gap:11px;font-family:var(--display);font-weight:600;font-size:18px;letter-spacing:-.01em;}\n.brand .mark{\n  width:34px;height:34px;border-radius:9px;background:var(--ink);color:var(--paper);\n  display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:-.02em;\n}\n.nav__links{display:flex;gap:4px;margin-left:18px;}\n.nav__links a{\n  font-size:15px;color:var(--ink-2);padding:8px 13px;border-radius:9px;font-weight:500;transition:.16s;\n}\n.nav__links a:hover{color:var(--ink);background:var(--paper-2);}\n.nav__links a.active{color:var(--ink);}\n.nav__sp{flex:1;}\n\n/* ---------- buttons ---------- */\n.btn{\n  display:inline-flex;align-items:center;gap:9px;cursor:pointer;\n  font-family:var(--body);font-weight:600;font-size:15px;\n  padding:12px 20px;border-radius:11px;border:1.5px solid var(--ink);\n  background:var(--ink);color:var(--paper);transition:.18s;white-space:nowrap;\n}\n.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow);}\n.btn--ghost{background:transparent;color:var(--ink);border-color:var(--line-2);}\n.btn--ghost:hover{border-color:var(--ink);background:var(--card);}\n.btn--blue{background:var(--blue);border-color:var(--blue);}\n.btn--blue:hover{background:var(--blue-ink);border-color:var(--blue-ink);}\n.btn--sm{padding:9px 15px;font-size:14px;border-radius:9px;}\n.btn .arr{transition:transform .18s;}\n.btn:hover .arr{transform:translateX(3px);}\n\n/* ---------- chips / tags ---------- */\n.tag{\n  display:inline-flex;align-items:center;gap:6px;\n  font-family:var(--mono);font-size:12px;letter-spacing:.02em;\n  padding:5px 11px;border-radius:20px;border:1px solid var(--line-2);\n  color:var(--ink-2);background:var(--card);\n}\n.tag--solid{background:var(--ink);color:var(--paper);border-color:var(--ink);}\n.tag--blue{background:color-mix(in srgb,var(--blue) 10%,white);color:var(--blue-ink);border-color:color-mix(in srgb,var(--blue) 25%,white);}\n.taglist{display:flex;flex-wrap:wrap;gap:8px;}\n\n.badge{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink-2);font-weight:500;}\n.badge .dot{width:8px;height:8px;border-radius:50%;background:#27a567;box-shadow:0 0 0 4px color-mix(in srgb,#27a567 18%,transparent);}\n\n/* ---------- cards - alk<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section class=\"phead\">\n    <div class=\"wrap\">\n      <span class=\"eyebrow\">Selected work<\u002Fspan>\n      <h1 class=\"display\">Revenue problems, solved end-to-end.<\u002Fh1>\n      <p class=\"lead\">A sample of engagements — each one started with messy data and ended with a system the team could trust. Names anonymized; metrics are placeholders for now.<\u002Fp>\n      <div class=\"filters\">\n        <span class=\"filter active\">All<\u002Fspan>\n        <span class=\"filter\">Forecasting<\u002Fspan>\n        <span class=\"filter\">Pipeline<\u002Fspan>\n        <span class=\"filter\">Automation<\u002Fspan>\n        <span class=\"filter\">Planning<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section\" style=\"padding-top:30px\">\n    <div class=\"wrap\">\n      <div class=\"cards\">\n        <a class=\"card card--hover cs\" href=\"case-study.html\">\n          <div class=\"ph\"><span class=\"ph__tag\">before / after<\u002Fspan><\u002Fdiv>\n          <div class=\"cs__body\">\n            <div class=\"cs__meta\"><span class=\"tag\">B2B SaaS · Series B<\u002Fspan><span class=\"tag\">Forecasting<\u002Fspan><\u002Fdiv>\n            <h3 class=\"display\">Rebuilt lead-to-revenue reporting<\u002Fh3>\n            <p>The board couldn’t trust the forecast. I rebuilt the data model end-to-end across Salesforce, dbt and Looker in six weeks.<\u002Fp>\n            <div class=\"cs__foot\"><div class=\"cs__metric\"><em>+34%<\u002Fem> accuracy<\u002Fdiv><span class=\"cs__go\">Read case →<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"card card--hover cs\" href=\"case-study.html\">\n          <div class=\"ph ph--blue\"><span class=\"ph__tag\">funnel map<\u002Fspan><\u002Fdiv>\n          <div class=\"cs__body\">\n            <div class=\"cs__meta\"><span class=\"tag\">B2B SaaS · 120 reps<\u002Fspan><span class=\"tag\">Pipeline<\u002Fspan><\u002Fdiv>\n            <h3 class=\"display\">Pipeline hygiene overhaul<\u002Fh3>\n            <p>Stage definitions nobody followed. I redesigned the funnel, automated enforcement, and tied it to comp.<\u002Fp>\n            <div class=\"cs__foot\"><div class=\"cs__metric\"><em>+19%<\u002Fem> win rate<\u002Fdiv><span class=\"cs__go\">Read case →<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"card card--hover cs\" href=\"case-study.html\">\n          <div class=\"ph\"><span class=\"ph__tag\">comp model<\u002Fspan><\u002Fdiv>\n          <div class=\"cs__body\">\n            <div class=\"cs__meta\"><span class=\"tag\">Scale-up<\u002Fspan><span class=\"tag\">Planning<\u002Fspan><\u002Fdiv>\n            <h3 class=\"display\">Self-serve territory &amp; comp planning<\u002Fh3>\n            <p>A quarterly spreadsheet fire-drill became a model finance and sales leadership actually trust.<\u002Fp>\n            <div class=\"cs__foot\"><div class=\"cs__metric\"><em>−40%<\u002Fem> planning time<\u002Fdiv><span class=\"cs__go\">Read case →<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"card card--hover cs\" href=\"case-study.html\">\n          <div class=\"ph ph--blue\"><span class=\"ph__tag\">automation<\u002Fspan><\u002Fdiv>\n          <div class=\"cs__body\">\n            <div class=\"cs__meta\"><span class=\"tag\">PLG SaaS<\u002Fspan><span class=\"tag\">Automation<\u002Fspan><\u002Fdiv>\n            <h3 class=\"display\">Lead routing &amp; SLA automation<\u002Fh3>\n            <p>Inbound leads sat for hours. I built routing + SLA tracking so the right rep got the right lead in seconds.<\u002Fp>\n            <div class=\"cs__foot\"><div class=\"cs__metric\"><em>−2.4h<\u002Fem> response time<\u002Fdiv><span class=\"cs__go\">Read case →<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"footer\">\n    <div class=\"wrap\">\n      <div class=\"cta\" style=\"padding:84px 0\">\n        <h2 class=\"display\">Have a similar problem?<\u002Fh2>\n        <p class=\"lead\" style=\"color:#c8c3b9;max-width:480px;margin:14px auto 30px\">Most engagements start with a 20-minute call and a look at your pipeline.<\u002Fp>\n        <a class=\"btn btn--blue\" href=\"index.html#contact\">Book an intro call<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot__bottom\" style=\"border-top:1px solid #322f2a\">\n        <span>© 2026 Jordan Diaz<\u002Fspan>\n        <a href=\"index.html\">← Back home<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fsection>\n<section class=\"site-page\" id=\"page-case\" hidden=\"\">\n<header class=\"nav\">\n    <div class=\"wrap nav__in\">\n      <a class=\"brand\" href=\"index.html\"><span class=\"mark\">JD<\u002Fspan> Jordan Diaz<\u002Fa>\n      <nav class=\"nav__links\">\n        <a href=\"work.html\" class=\"active\">Work<\u002Fa>\n        <a href=\"tools.html\">Tools<\u002Fa>\n        <a href=\"about.html\">About<\u002Fa>\n      <\u002Fnav>\n      <div class=\"nav__sp\"><\u002Fdiv>\n      <a class=\"btn btn--ghost btn--sm\" href=\"#\" download=\"\">Résumé ↓<\u002Fa>\n      <a class=\"btn btn--sm\" href=\"index.html#contact\">Let’s talk<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section class=\"cs-hero\">\n    <div class=\"wrap\">\n      <a class=\"back\" href=\"work.html\">← All work<\u002Fa>\n      <span class=\"eyebrow\">Case study · Forecasting<\u002Fspan>\n      <h1 class=\"display\">Rebuilt lead-to-revenue reporting in six weeks<\u002Fh1>\n      <p class=\"lead\">A Series B SaaS team was flying blind on pipeline. I rebuilt the reporting model end-to-end so leadership could finally trust the number they took to the board.<\u002Fp>\n      <div class=\"taglist\">\n        <span class=\"tag tag--solid\">Role: Fractional RevOps lead<\u002Fspan>\n        <span class=\"tag\">Industry: B2B SaaS<\u002Fspan>\n        <span class=\"tag\">2024 · 6 weeks<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ph hero-ph\"><span class=\"ph__tag\">hero — dashboard before / after<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section\" style=\"padding-top:56px\">\n    <div class=\"wrap layout\">\n      <aside class=\"aside\">\n        <div class=\"blk\"><div class=\"k\">Client<\u002Fdiv><div class=\"v\">Series B SaaS · ~120 reps<\u002Fdiv><\u002Fdiv>\n        <div class=\"blk\"><div class=\"k\">Scope<\u002Fdiv><div class=\"v\">Reporting &amp; forecasting rebuild<\u002Fdiv><\u002Fdiv>\n        <div class=\"blk\"><div class=\"k\">Stack<\u002Fdiv><div class=\"v\">Salesforce · dbt · BigQuery · Looker<\u002Fdiv><\u002Fdiv>\n        <div class=\"blk\"><div class=\"k\">Timeline<\u002Fdiv><div class=\"v\">6 weeks, solo<\u002Fdiv><\u002Fdiv>\n        <div class=\"blk\">\n          <div class=\"k\">Headline outcome<\u002Fdiv>\n          <div class=\"out\">\n            <div class=\"big\"><em>+34%<\u002Fem><\u002Fdiv>\n            <div class=\"cap\">improvement in forecast accuracy within one quarter<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Faside>\n\n      <div class=\"body\">\n        <div class=\"blk\">\n          <h2 class=\"display\">Context<\u002Fh2>\n          <p>The company had grown from 30 to 120 reps in 18 months. Reporting hadn’t kept up — three sources of truth, a tangle of manual spreadsheets, and a forecast the CRO described as <strong>“a vibe, not a number.”<\u002Fstrong><\u002Fp>\n          <p>Every Monday, ops spent half a day stitching exports together. By the time the number reached leadership, it was already stale.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"blk\">\n          <h2 class=\"display\" style=\"color:var(--blue-ink)\">The problem<\u002Fh2>\n          <p>Three issues compounded each other: inconsistent stage definitions across teams, no single source of truth for pipeline, and a forecast built on gut-feel overrides that nobody could trace.<\u002Fp>\n          <div class=\"pullquote\">“We were making board-level commitments on a model no one in the building could actually explain.”<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"blk\">\n          <h2 class=\"display\">What I did<\u002Fh2>\n          <p>I started by mapping every field and handoff from lead creation to closed revenue, then rebuilt the model from the ground up:<\u002Fp>\n          <p>Standardized stage definitions with the sales leadership team · modeled the funnel in dbt on top of BigQuery · rebuilt the exec dashboard in Looker with drill-downs · and replaced manual overrides with a transparent, weighted forecast.<\u002Fp>\n          <div class=\"steps\">\n            <div class=\"ph\"><span class=\"ph__tag\">data model — dbt lineage<\u002Fspan><\u002Fdiv>\n            <div class=\"ph ph--blue\"><span class=\"ph__tag\">looker exec dashboard<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"blk\">\n          <h2 class=\"display\">Impact<\u002Fh2>\n          <p>One quarter after launch, the forecast was within 6% of actuals — and Monday mornings got their half-day back.<\u002Fp>\n          <div class=\"impact\">\n            <div class=\"card\"><div class=\"n\"><em>+34%<\u002Fem><\u002Fdiv><div class=\"k\">Forecast accuracy<\u002Fdiv><\u002Fdiv>\n            <div class=\"card\"><div class=\"n\"><em>1<\u002Fem><\u002Fdiv><div class=\"k\">Source of truth, finally<\u002Fdiv><\u002Fdiv>\n            <div class=\"card\"><div class=\"n\"><em>4h<\u002Fem><\u002Fdiv><div class=\"k\">Saved per week in ops<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"blk\" style=\"margin-bottom:0\">\n          <h2 class=\"display\">Reflection<\u002Fh2>\n          <p>The hard part was never the SQL — it was getting three teams to agree on what “qualified” meant. The lasting win was a model the team could maintain without me.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"wrap\">\n    <div class=\"nextbar\">\n      <a href=\"case-study.html\">\n        <div><div class=\"small\">Next case study<\u002Fdiv><h3 class=\"display\">Pipeline hygiene overhaul for 120 reps<\u002Fh3><\u002Fdiv>\n        <span style=\"font-size:30px\">→<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"footer\">\n    <div class=\"wrap\">\n      <div class=\"cta\" style=\"padding:84px 0\">\n        <h2 class=\"display\">Want this for your forecast?<\u002Fh2>\n        <p class=\"lead\" style=\"color:#c8c3b9;max-width:480px;margin:14px auto 30px\">Tell me where your reporting breaks down. I’ll scope a fix.<\u002Fp>\n        <a class=\"btn btn--blue\" href=\"index.html#contact\">Book an intro call<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot__bottom\" style=\"border-top:1px solid #322f2a\">\n        <span>© 2026 Jordan Diaz<\u002Fspan>\n        <a href=\"index.html\">← Back home<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fsection>\n<section class=\"site-page\" id=\"page-tools\" hidden=\"\">\n<header class=\"nav\">\n    <div class=\"wrap nav__in\">\n      <a class=\"brand\" href=\"index.html\"><span class=\"mark\">JD<\u002Fspan> Jordan Diaz<\u002Fa>\n      <nav class=\"nav__links\">\n        <a href=\"work.html\">Work<\u002Fa>\n        <a href=\"tools.html\" class=\"active\">Tools<\u002Fa>\n        <a href=\"about.html\">About<\u002Fa>\n      <\u002Fnav>\n      <div class=\"nav__sp\"><\u002Fdiv>\n      <a class=\"btn btn--ghost btn--sm\" href=\"#\" download=\"\">Résumé ↓<\u002Fa>\n      <a class=\"btn btn--sm\" href=\"index.html#contact\">Let’s talk<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section class=\"phead\">\n    <div class=\"wrap\">\n      <span class=\"eyebrow\">The builder side<\u002Fspan>\n      <h1 class=\"display\">Internal tools I’ve designed and shipped.<\u002Fh1>\n      <p class=\"lead\">RevOps t \"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <span class=\"tag\">Dashboard<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"display\">Deal risk dashboard<\u002Fh3>\n            <p>Scores open deals on activity, momentum and CRM signals so slippage is visible before it costs the quarter.<\u002Fp>\n            <div class=\"taglist\"><span class=\"tag\">SQL<\u002Fspan><span class=\"tag\">Looker<\u002Fspan><span class=\"tag\">Salesforce<\u002Fspan><\u002Fdiv>\n            <div class=\"tl__foot\" style=\"margin-top:16px\"><span class=\"tag tag--solid\">Live · sales org<\u002Fspan><span class=\"tl__go\">View build →<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"card card--hover tl\" href=\"tool.html\">\n          <div class=\"ph ph--blue\"><span class=\"ph__tag\">send queue<\u002Fspan><\u002Fdiv>\n          <div class=\"tl__body\">\n            <div class=\"tl__top\">\n              <div class=\"tl__icon\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M3 5h14M3 10h14M3 15h9\" stroke=\"#1c1b19\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <span class=\"tag\">Automation<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"display\">Email sender tool<\u002Fh3>\n            <p>Bulk, templated, fully-tracked outbound with guardrails — built when off-the-shelf sequencers couldn’t fit the workflow.<\u002Fp>\n            <div class=\"taglist\"><span class=\"tag\">Python<\u002Fspan><span class=\"tag\">APIs<\u002Fspan><\u002Fdiv>\n            <div class=\"tl__foot\" style=\"margin-top:16px\"><span class=\"tag tag--solid\">Internal<\u002Fspan><span class=\"tl__go\">View build →<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"card card--hover tl\" href=\"tool.html\">\n          <div class=\"ph\"><span class=\"ph__tag\">intel feed<\u002Fspan><\u002Fdiv>\n          <div class=\"tl__body\">\n            <div class=\"tl__top\">\n              <div class=\"tl__icon\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 20 20\" fill=\"none\"><circle cx=\"9\" cy=\"9\" r=\"5.5\" stroke=\"#1c1b19\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M13 13l4 4\" stroke=\"#1c1b19\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <span class=\"tag\">Listening<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"display\">Competitive intel tool<\u002Fh3>\n            <p>Monitors competitor moves across social and the web, then digests the signal into a weekly brief for sales and product.<\u002Fp>\n            <div class=\"taglist\"><span class=\"tag\">Python<\u002Fspan><span class=\"tag\">Scrapers<\u002Fspan><span class=\"tag\">LLM<\u002Fspan><\u002Fdiv>\n            <div class=\"tl__foot\" style=\"margin-top:16px\"><span class=\"tag tag--solid\">Live · weekly<\u002Fspan><span class=\"tl__go\">View build →<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"footer\">\n    <div class=\"wrap\">\n      <div class=\"cta\" style=\"padding:84px 0\">\n        <h2 class=\"display\">Need a tool that doesn’t exist yet?<\u002Fh2>\n        <p class=\"lead\" style=\"color:#c8c3b9;max-width:480px;margin:14px auto 30px\">If your team is duct-taping spreadsheets, there’s probably something worth building.<\u002Fp>\n        <a class=\"btn btn--blue\" href=\"index.html#contact\">Let’s scope it<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot__bottom\" style=\"border-top:1px solid #322f2a\">\n        <span>© 2026 Jordan Diaz<\u002Fspan>\n        <a href=\"index.html\">← Back home<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fsection>\n<section class=\"site-page\" id=\"page-tool\" hidden=\"\">\n<header class=\"nav\">\n    <div class=\"wrap nav__in\">\n      <a class=\"brand\" href=\"index.html\"><span class=\"mark\">JD<\u002Fspan> Jordan Diaz<\u002Fa>\n      <nav class=\"nav__links\">\n        <a href=\"work.html\">Work<\u002Fa>\n        <a href=\"tools.html\" class=\"active\">Tools<\u002Fa>\n        <a href=\"about.html\">About<\u002Fa>\n      <\u002Fnav>\n      <div class=\"nav__sp\"><\u002Fdiv>\n      <a class=\"btn btn--ghost btn--sm\" href=\"#\" download=\"\">Résumé ↓<\u002Fa>\n      <a class=\"btn btn--sm\" href=\"index.html#contact\">Let’s talk<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section>\n    <div class=\"wrap\">\n      <a class=\"back\" href=\"tools.html\">← All tools<\u002Fa>\n      <div class=\"th\">\n        <div class=\"th__icon\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 20 20\" fill=\"none\"><rect x=\"2\" y=\"2\" width=\"16\" height=\"16\" rx=\"5\" stroke=\"#f5f4ef\" stroke-width=\"1.6\"><\u002Frect><circle cx=\"10\" cy=\"10\" r=\"3\" fill=\"#f5d649\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <div>\n          <span class=\"eyebrow\" style=\"margin-bottom:8px\">Internal tool · Slack · AI<\u002Fspan>\n          <h1 class=\"display\">Finn AI<\u002Fh1>\n          <p class=\"lead\">A Slack-native AI assistant for the go-to-market team — it answers account questions, pulls live CRM context, and drafts follow-ups without anyone leaving the channel.<\u002Fp>\n          <div class=\"taglist\" style=\"margin-top:22px\"><span class=\"tag\">Python<\u002Fspan><span class=\"tag\">Slack API<\u002Fspan><span class=\"tag\">LLM / RAG<\u002Fspan><span class=\"tag\">Salesforce<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ph hero-ph\"><span class=\"ph__tag\">product shot — slack conversation<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section\" style=\"padding-top:56px\">\n    <div class=\"wrap layout\">\n      <aside class=\"aside\">\n        <div class=\"blk\"><div class=\"k\">Built for<\u002Fdiv><div class=\"v\">GTM team · ~40 users<\u002Fdiv><\u002Fdiv>\n        <div class=\"blk\"><div class=\"k\">My role<\u002Fdiv><div class=\"v\">Design + build, solo<\u002Fdiv><\u002Fdiv>\n        <div class=\"blk\"><div class=\"k\">Stack<\u002Fdiv><div class=\"v\">Python · Slack API · LLM + RAG · Salesforce<\u002Fdiv><\u002Fdiv>\n        <div class=\"blk\"><div class=\"k\">Status<\u002Fdiv><div class=\"status\"><span class=\"dot\"><\u002Fspan> Live, in daily use<\u002Fdiv><\u002Fdiv>\n      <\u002Faside>\n\n      <div class=\"body\">\n        <div class=\"blk\">\n          <h2 class=\"display\">The problem<\u002Fh2>\n          <p>Reps lived in Slack but the answers lived everywhere else — Salesforce, the data warehouse, old threads, the wiki. Simple questions like <strong>“what’s the status on this account?”<\u002Fstrong> meant five tabs and ten minutes.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"blk\">\n          <h2 class=\"display\">What it does<\u002Fh2>\n          <ul>\n            <li><div><b>Answers GTM questions in-channel.<\u002Fb><div class=\"mk\">@finn what’s the renewal date for Northwind?<\u002Fdiv><\u002Fdiv><\u002Fli>\n            <li><div><b>Surfaces live account context<\u002Fb> — pipeline, recent activity, open risks — pulled straight from the CRM.<\u002Fdiv><\u002Fli>\n            <li><div><b>Drafts follow-ups and recaps<\u002Fb> in the rep’s voice, grounded in the actual deal history.<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"blk\">\n          <h2 class=\"display\">How it works<\u002Fh2>\n          <p>A thin Slack bot routes each message through a retrieval layer that grounds the model in real CRM + warehouse data before it answers — so responses are specific, not generic.<\u002Fp>\n          <div class=\"flow\">\n            <div class=\"node\"><div class=\"ic\">Input<\u002Fdiv><div class=\"nm\">Slack<\u002Fdiv><div class=\"ds\">@finn mention<\u002Fdiv><\u002Fdiv>\n            <div class=\"arrow\">→<\u002Fdiv>\n            <div class=\"node\"><div class=\"ic\">Route<\u002Fdiv><div class=\"nm\">Bot / API<\u002Fdiv><div class=\"ds\">Python service<\u002Fdiv><\u002Fdiv>\n            <div class=\"arrow\">→<\u002Fdiv>\n            <div class=\"node\"><div class=\"ic\">Ground<\u002Fdiv><div class=\"nm\">RAG layer<\u002Fdiv><div class=\"ds\">CRM + warehouse<\u002Fdiv><\u002Fdiv>\n            <div class=\"arrow\">→<\u002Fdiv>\n            <div class=\"node\"><div class=\"ic\">Answer<\u002Fdiv><div class=\"nm\">LLM<\u002Fdiv><div class=\"ds\">cited response<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"blk\">\n          <h2 class=\"display\">Results<\u002Fh2>\n          <div class=\"res\">\n            <div class=\"card\"><div class=\"n\"><em>~40<\u002Fem><\u002Fdiv><div class=\"k\">Weekly active users<\u002Fdiv><\u002Fdiv>\n            <div class=\"card\"><div class=\"n\"><em>10→1<\u002Fem><\u002Fdiv><div class=\"k\">Tabs to answer a question<\u002Fdiv><\u002Fdiv>\n            <div class=\"card\"><div class=\"n\"><em>&lt;5s<\u002Fem><\u002Fdiv><div class=\"k\">Median response time<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"blk\" style=\"margin-bottom:0\">\n          <h2 class=\"display\">What I’d build next<\u002Fh2>\n          <p>Proactive nudges — Finn flagging at-risk accounts in-channel before anyone has to ask — and write-back so reps can update the CRM from Slack directly.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"footer\">\n    <div class=\"wrap\">\n      <div class=\"cta\" style=\"padding:84px 0\">\n        <h2 class=\"display\">Want something like Finn?<\u002Fh2>\n        <p class=\"lead\" style=\"color:#c8c3b9;max-width:480px;margin:14px auto 30px\">If your team lives in Slack but the answers don’t, this pattern travels well.<\u002Fp>\n        <a class=\"btn btn--blue\" href=\"index.html#contact\">Let’s talk tooling<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot__bottom\" style=\"border-top:1px solid #322f2a\">\n        <span>© 2026 Jordan Diaz<\u002Fspan>\n        <a href=\"index.html\">← Back home<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fsection>\n<section class=\"site-page\" id=\"page-about\" hidden=\"\">\n<header class=\"nav\">\n    <div class=\"wrap nav__in\">\n      <a class=\"brand\" href=\"index.html\"><span class=\"mark\">JD<\u002Fspan> Jordan Diaz<\u002Fa>\n      <nav class=\"nav__links\">\n        <a href=\"work.html\">Work<\u002Fa>\n        <a href=\"tools.html\">Tools<\u002Fa>\n        <a href=\"about.html\" class=\"active\">About<\u002Fa>\n      <\u002Fnav>\n      <div class=\"nav__sp\"><\u002Fdiv>\n      <a class=\"btn btn--ghost btn--sm\" href=\"#\" download=\"\">Résumé ↓<\u002Fa>\n      <a class=\"btn btn--sm\" href=\"index.html#contact\">Let’s talk<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section class=\"intro\">\n    <div class=\"wrap intro__grid\">\n      <div>\n        <span class=\"eyebrow\">About<\u002Fspan>\n        <h1 class=\"display\">I make revenue teams<br>run on evidence.<\u002Fh1>\n        <p>Eight years in revenue operations across B2B SaaS — from analyst to fractional lead. I sit between sales, marketing, finance and data, and I’m happiest when a messy process turns into something <strong>clean, measurable, and self-serve.<\u002Fstrong><\u002Fp>\n        <p>The thread through all of it: I don’t just diagnose — I build the systems and tools that make the fix stick.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ph portrait\"><span class=\"ph__tag\">portrait<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section\" style=\"padding-top:40px\">\n    <div class=\"wrap layout\">\n      <div>\n        <span class=\"eyebrow\">Experience<\u002Fspan>\n        <h2 class=\"display\" style=\"margin:12px 0 36px\">A decade of operating.<\u002Fh2>\n        <div class=\"tl\">\n          <div class=\"tl__item now\">\n            <div class=\"tl__date\">2023 — present<\u002Fdiv>\n            <div class=\"tl__role\">Fractional RevOps Lead<\u002Fdiv>\n            <div class=\"tl__co\">Independent · <b>multiple B2B SaaS clients<\u002Fb><\u002Fdiv>\n            <p>Embed with Series A–C teams to rebuild forecasting, fix pipeline hygiene, and ship the internal tools their stack is missing.<\u002Fp>\n            <div class=\"taglist\"><span class=\"tag\">Salesforce<\u002Fspan><span class=\"tag\">SQL<\u002Fspan><span class=\"tag\">Looker<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl__item\">\n            <div class=\"tl__date\">2021 — 2023<\u002Fdiv>\n            <div class=\"tl__role\">Senior RevOps Manager<\u002Fdiv>\n            <div class=\"tl__co\"><b>Growth-stage SaaS<\u002Fb> · ~120 reps<\u002Fdiv>\n            <p>Owned the GTM data model and forecast end-to-end. Built the first version of the deal-risk dashboard and Finn AI here.<\u002Fp>\n            <div class=\"taglist\"><span class=\"tag\">HubSpot<\u002Fspan><span class=\"tag\">dbt<\u002Fspan><span class=\"tag\">Python<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl__item\">\n            <div class=\"tl__date\">2019 — 2021<\u002Fdiv>\n            <div class=\"tl__role\">RevOps Analyst<\u002Fdiv>\n            <div class=\"tl__co\"><b>B2B SaaS<\u002Fb> · early scale<\u002Fdiv>\n            <p>Reporting, territory and comp modeling. Learned where pipeline really leaks — and how to instrument it.<\u002Fp>\n            <div class=\"taglist\"><span class=\"tag\">Sheets<\u002Fspan><span class=\"tag\">SQL<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl__item\">\n            <div class=\"tl__date\">2017 — 2019<\u002Fdiv>\n            <div class=\"tl__role\">Sales / BizOps<\u002Fdiv>\n            <div class=\"tl__co\"><b>First ops hire<\u002Fb><\u002Fdiv>\n            <p>Carried a number before I optimized them — which is why my systems are built for the people who actually use them.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <aside>\n        <div class=\"card rcard\">\n          <div class=\"ph\"><span class=\"ph__tag\">résumé preview<\u002Fspan><\u002Fdiv>\n          <h3 class=\"display\">Full résumé<\u002Fh3>\n          <p>The one-page version, with references and full role detail.<\u002Fp>\n          <a class=\"btn btn--blue\" href=\"#\" download=\"\" style=\"width:100%;justify-content:center\">Download PDF ↓<\u002Fa>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section\" style=\"background:var(--paper-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)\">\n    <div class=\"wrap\">\n      <div class=\"kicker-row\">\n        <div>\n          <span class=\"eyebrow\">Toolbox<\u002Fspan>\n          <h2 class=\"display\">Skills &amp; stack.<\u002Fh2>\n          <p class=\"lead\" style=\"max-width:520px;margin-top:14px\">Grouped by what I do with them — not a logo wall.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"skills\">\n        <div class=\"card skill\">\n          <h3 class=\"display\"><span class=\"d\"><\u002Fspan> CRM &amp; platforms<\u002Fh3>\n          <div class=\"taglist\"><span class=\"tag\">Salesforce<\u002Fspan><span class=\"tag\">HubSpot<\u002Fspan><span class=\"tag\">Outreach<\u002Fspan><span class=\"tag\">Gong<\u002Fspan><\u002Fdiv>\n          <div class=\"meter\"><span class=\"lab\">Salesforce<\u002Fspan><span class=\"track\"><span class=\"fill\" style=\"width:92%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"meter\"><span class=\"lab\">HubSpot<\u002Fspan><span class=\"track\"><span class=\"fill\" style=\"width:80%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card skill\">\n          <h3 class=\"display\"><span class=\"d\"><\u002Fspan> Data &amp; SQL<\u002Fh3>\n          <div class=\"taglist\"><span class=\"tag\">SQL<\u002Fspan><span class=\"tag\">dbt<\u002Fspan><span class=\"tag\">BigQuery<\u002Fspan><span class=\"tag\">Python<\u002Fspan><\u002Fdiv>\n          <div class=\"meter\"><span class=\"lab\">SQL<\u002Fspan><span class=\"track\"><span class=\"fill\" style=\"width:88%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"meter\"><span class=\"lab\">dbt / modeling<\u002Fspan><span class=\"track\"><span class=\"fill\" style=\"width:74%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card skill\">\n          <h3 class=\"display\"><span class=\"d\"><\u002Fspan> Automation<\u002Fh3>\n          <div class=\"taglist\"><span class=\"tag\">Zapier<\u002Fspan><span class=\"tag\">n8n<\u002Fspan><span class=\"tag\">Workato<\u002Fspan><span class=\"tag\">APIs<\u002Fspan><\u002Fdiv>\n          <div class=\"meter\"><span class=\"lab\">Workflow automation<\u002Fspan><span class=\"track\"><span class=\"fill\" style=\"width:85%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"meter\"><span class=\"lab\">API integration<\u002Fspan><span class=\"track\"><span class=\"fill\" style=\"width:78%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card skill\">\n          <h3 class=\"display\"><span class=\"d\"><\u002Fspan> BI &amp; reporting<\u002Fh3>\n          <div class=\"taglist\"><span class=\"tag\">Looker<\u002Fspan><span class=\"tag\">Tableau<\u002Fspan><span class=\"tag\">Hex<\u002Fspan><span class=\"tag\">Sheets<\u002Fspan><\u002Fdiv>\n          <div class=\"meter\"><span class=\"lab\">Looker<\u002Fspan><span class=\"track\"><span class=\"fill\" style=\"width:86%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"meter\"><span class=\"lab\">Dashboard design<\u002Fspan><span class=\"track\"><span class=\"fill\" style=\"width:90%\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"footer\">\n    <div class=\"wrap\">\n      <div class=\"cta\" style=\"padding:84px 0\">\n        <h2 class=\"display\">Let’s work together.<\u002Fh2>\n        <p class=\"lead\" style=\"color:#c8c3b9;max-width:480px;margin:14px auto 30px\">Fractional, project-based, or advisory — tell me what you’re wrestling with.<\u002Fp>\n        <a class=\"btn btn--blue\" href=\"index.html#contact\">Get in touch<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"foot__bottom\" style=\"border-top:1px solid #322f2a\">\n        <span>© 2026 Jordan Diaz<\u002Fspan>\n        <a href=\"index.html\">← Back home<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fsection>\n\n<script>\n(function(){\n  var map={'index.html':'home','work.html':'work','case-study.html':'case','tools.html':'tools','tool.html':'tool','about.html':'about'};\n  function pageEl(id){return document.getElementById('page-'+id);}\n  function scrollToHash(hash){\n    if(!hash){window.scrollTo(0,0);return;}\n    var active=document.querySelector('.site-page:not([hidden])');\n    var el=active?active.querySelector(hash):document.querySelector(hash);\n    if(el){var y=el.getBoundingClientRect().top+window.scrollY-80;window.scrollTo({top:y});}\n    else window.scrollTo(0,0);\n  }\n  function go(id,hash){\n    if(!pageEl(id))id='home';\n    document.querySelectorAll('.site-page').forEach(function(s){s.hidden=true;});\n    pageEl(id).hidden=false;\n    try{localStorage.setItem('pf_page',id);}catch(e){}\n    requestAnimationFrame(function(){scrollToHash(hash||'');});\n  }\n  document.addEventListener('click',function(e){\n    var a=e.target.closest&&e.target.closest('a');if(!a)return;\n    var href=a.getAttribute('href')||'';\n    var m=href.match(/^([a-z-]+\\.html)(#[\\w-]+)?$/);\n    if(m){e.preventDefault();go(map[m[1]]||'home',m[2]||'');return;}\n    if(href.charAt(0)==='#'){e.preventDefault();scrollToHash(href);return;}\n  });\n  var start='home';\n  try{var s=localStorage.getItem('pf_page');if(s&&pageEl(s))start=s;}catch(e){}\n  go(start,'');\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbo
